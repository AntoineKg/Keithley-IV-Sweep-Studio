name: Build Windows executable

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build executable
        run: >-
          pyinstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name "Keithley-IV-Sweep-Studio"
          --icon "assets/Keithley-IV-Sweep-Studio.ico"
          --collect-all keithley2600
          --collect-all pyvisa_py
          --copy-metadata pyvisa-py
          Keithley_IV_Sweep_Studio.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Keithley-IV-Sweep-Studio-Windows
          path: dist/Keithley-IV-Sweep-Studio.exe
          if-no-files-found: error
          retention-days: 30

      - name: Publish executable on tagged releases
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload "${{ github.ref_name }}" "dist/Keithley-IV-Sweep-Studio.exe" --clobber
          } else {
            gh release create "${{ github.ref_name }}" "dist/Keithley-IV-Sweep-Studio.exe" --title "Keithley I-V Sweep Studio ${{ github.ref_name }}" --generate-notes
          }
